# --- Configuration ----------------------------------------------------------
_jinja_extensions:
  - "copier_templates_extensions.TemplateExtensionLoader"
  - "extensions/strict_undefined.py:SetStrictUndefined"

_subdirectory: "template"

# --- Questions --------------------------------------------------------------

module_type:
  type: str
  help: "The type of the module to be created."
  default: "datasets"
  choices:
    - datasets
    - features
    - models

module_name:
  type: str
  help: "The name of the module to be created. Must be a valid Python identifier"
  validator: >-
    {% if not (module_name | regex_search('^[a-zA-Z_][a-zA-Z0-9_]*$')) %}
      The module name must start with a letter or underscore and can only contain letters, numbers, and underscores.
    {% endif %}

module_name_long:
  type: str
  help: "The long form human-readable name of the module to be created."
  default: "{{ module_name | replace('_', ' ') | title }}"

module_description:
  type: str
  help: "A short description of the module to be created."
  default: "A {{ module_type }} module for {{ module_name_long }}."

format_code:
  type: bool
  help: >-
    Whether to format the generated code after generation.
    You must have `black`, `ruff`, and `snakefmt` installed
    in your conda environment for this to work.
    If you do not run this, you will need to run
    `black`, `ruff`, and `snakefmt` manually
    after running `copier` in order for lint tests to pass.
  default: true

# --- Calculated Variables ---------------------------------------------------

parent_project_tpl_answers_file:
  type: str
  help: "The path to the parent package template file."
  default: ".copier-answers/project.yml"
  when: False

smk_file_name:
  type: str
  help: "The name of the smk file where the rule will be implemented."
  default: "{{ module_type }}/{{ module_name }}.smk"
  when: False

_answers_file: >-
  ./copier-answers/module-{{ module_type }}-{{ module_name }}.yml

_external_data:
  parent_projec_tpl: "{{ parent_project_tpl_answers_file }}"

package_name:
  type: str
  help: >-
    The name of the project.

    DO NOT CHANGE THIS VALUE FROM THE DEFAULT
    IT SHOULD STAY IN SYNC WITH THE PARENT PROJECT TEMPLATE.
  default: "{{ _external_data.parent_projec_tpl.package_name }}"

# --- Post-configuration -----------------------------------------------------

_skip_if_exists:
  - "snakefmt.toml"
  - "workflow/profiles/default/config.yaml"
  - "workflow/rules/includes.smk"

# Post-generation hooks
_tasks:
  # Add the rule to the workflow includes file
  - command: [
      "{{ _copier_python }}",
      "{{ _copier_conf.src_path }}/tasks/append_smk_include.py",
      "{{ smk_file_name }}"
    ]
  # Add the config to the workflow profile
  - command: [
      "{{ _copier_python }}",
      "{{ _copier_conf.src_path }}/tasks/append_config_include.py",
      "config/{{ module_type }}/{{ module_name }}/config.yaml"
    ]

  # Run black, ruff, and snakefmt to format the code to fix line wraps
  # depending on length of generated code.
  - command: >-
      black ./
    when: "{{ format_code }}"
  - command: >-
      ruff check --fix ./
    when: "{{ format_code }}"
  - command: >-
      snakefmt --config snakefmt.toml workflow/
    when: "{{ format_code }}"

_message_after_copy: |
  The {{ module_type }}/{{ module_name }} module has been created successfully.

  See `.copier-answers/post-copier-todos/module-{{ module_type }}-{{ module_name }}.md`
  for next steps on implementing your rule into the project.
  You can copy-paste the contents of that file into a GitHub issue
  or a project management tool to track the implementation of the rule.
